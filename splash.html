<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Start your routine</title>
  <meta name="description" content="A calm place to begin a daily routine and track progress." />
  <link rel="icon" href="image/train img.png" type="image/png" />
  <link rel="stylesheet" href="style.css" />
  <meta name="theme-color" content="#14B8A6" />
  <style>
    :root { --splash-bg-1: #0f172a; --splash-bg-2: #0ea5a4; --splash-accent: #7c3aed; }
    html, body { height: 100%; margin: 0; }
    body.page-splash {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(800px 400px at 10% 10%, rgba(124, 58, 237, 0.12), transparent 18%),
                  radial-gradient(700px 350px at 90% 30%, rgba(14, 165, 164, 0.08), transparent 16%),
                  linear-gradient(180deg, #081128 0%, #07132a 40%, #041726 100%);
      color: #E6EEF8;
      overflow: hidden;
    }
    .splash-center {
      width: 100%;
      max-width: 520px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      align-items: center;
      text-align: center;
    }
    .logo-wrap {
      width: 132px;
      height: 132px;
      border-radius: 28px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.04);
      box-shadow: 0 18px 60px rgba(7, 13, 30, 0.6);
      backdrop-filter: blur(8px);
      animation: logoPulse 1600ms ease-in-out infinite;
    }
    .logo-wrap img { width: 64px; height: 64px; display: block; border-radius: 12px; }
    @keyframes logoPulse {
      0% { transform: scale(1); box-shadow: 0 12px 40px rgba(124,58,237,0.12); }
      50% { transform: scale(1.06); box-shadow: 0 28px 80px rgba(124,58,237,0.18); }
      100% { transform: scale(1); box-shadow: 0 12px 40px rgba(124,58,237,0.12); }
    }
    .splash-title { font-size: clamp(1.5rem, 5.2vw, 2rem); font-weight: 800; letter-spacing: -0.02em; margin: 0; color: #FFFFFF; }
    .splash-sub { color: rgba(230, 238, 248, 0.82); margin: 0; font-size: 0.98rem; max-width: 420px; }
    .loader { margin-top: 0.6rem; display: flex; gap: 0.6rem; align-items: center; justify-content: center; }
    .spinner {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: rgba(255,255,255,0.9);
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-line { width: 96px; height: 6px; border-radius: 999px; background: linear-gradient(90deg, rgba(255,255,255,0.08), rgba(255,255,255,0.06)); }
    .fade-out { animation: fadeOut 420ms ease forwards; }
    @keyframes fadeOut { to { opacity: 0; transform: scale(.995); } }
    @media (max-width: 420px) {
      .logo-wrap { width: 108px; height: 108px; }
      .splash-center { padding: 1.25rem; }
    }
  </style>
</head>
<body class="page-splash">
  <main class="splash-center" id="splash">
    <div class="logo-wrap" aria-hidden="true">
      <img src="image/train img.png" alt="" />
    </div>
    <h1 class="splash-title">A calm place to begin</h1>
    <p class="splash-sub">Start with one small habit, track your day, and build momentum without pressure.</p>
    <button id="begin-onboarding-btn" class="btn btn-primary" style="padding:.9rem 1.3rem;border-radius:999px">Start</button>
    <div class="loader" aria-hidden="true">
      <div class="spinner" role="img" aria-label="Loading"></div>
      <div class="loading-line"></div>
    </div>
  </main>

  <script>
    (function () {
      const el = document.getElementById('splash');
      const button = document.getElementById('begin-onboarding-btn');
      localStorage.setItem('habitflow-seen-splash', 'true');
      const goNext = () => {
        el.classList.add('fade-out');
        setTimeout(() => {
          window.location.replace('onboarding-1.html');
        }, 320);
      };
      button?.addEventListener('click', goNext);
      setTimeout(goNext, 2200);
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HabitFlow — Onboarding</title>
  <meta name="description" content="Onboarding — personalize your habits" />
  <link rel="icon" href="image/train img.png" type="image/png" />
  <link rel="stylesheet" href="style.css" />
  <meta name="theme-color" content="#14B8A6" />
  <style>
    /* Mobile-first full-screen onboarding styling */
    html,body{height:100%;margin:0}
    body.page-onboarding{min-height:100vh;display:flex;flex-direction:column;background:linear-gradient(180deg,#07132a 0%, #06283a 50%, #052b3c 100%);color:#EAF4FF;font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;}

    .onboard-hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.25rem;gap:1rem;position:relative;overflow:hidden}

    .onboard-visual{width:84%;max-width:420px;border-radius:22px;padding:1rem;background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.02));box-shadow:0 30px 80px rgba(2,6,23,0.6);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.04);display:grid;place-items:center}
    .onboard-visual img{width:100%;height:auto;border-radius:14px;transform:translateZ(0);}

    .floating-icons{position:absolute;right:6%;top:12%;display:flex;gap:.6rem;pointer-events:none}
    .floating-icons .icon{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,rgba(255,255,255,0.96),rgba(255,255,255,0.85));display:grid;place-items:center;font-size:1.2rem;box-shadow:0 12px 36px rgba(2,6,23,0.5)}
    .floating-icons .icon:nth-child(1){animation:floatSlight 6s ease-in-out infinite}
    .floating-icons .icon:nth-child(2){animation:floatSlight 5.2s ease-in-out infinite;animation-delay:.3s}
    .floating-icons .icon:nth-child(3){animation:floatSlight 7s ease-in-out infinite;animation-delay:.6s}

    .onboard-card{margin-top:1rem;width:92%;max-width:540px;background:rgba(255,255,255,0.04);border-radius:20px;padding:1rem;border:1px solid rgba(255,255,255,0.04);backdrop-filter:blur(8px);box-shadow:0 18px 48px rgba(2,6,23,0.55);}
    .onboard-eyebrow{color:rgba(234,244,255,0.9);font-weight:800;display:inline-block;margin-bottom:.35rem}
    .onboard-title{font-size:clamp(1.6rem,5vw,2.4rem);line-height:1;margin:0 0 .5rem;font-weight:800}
    .onboard-copy{color:rgba(234,244,255,0.85);margin:0 0 .5rem}

    .progress-dots{display:flex;gap:.5rem;align-items:center;justify-content:center;margin-top:.6rem}
    .dot{width:10px;height:10px;border-radius:999px;background:rgba(255,255,255,0.12)}
    .dot.active{background:linear-gradient(135deg,var(--primary),var(--accent));width:12px;height:12px;transform:scale(1.05)}

    .onboard-actions{display:flex;gap:.6rem;justify-content:space-between;margin-top:.85rem}
    .btn-skip{flex:1;background:transparent;border:1px solid rgba(255,255,255,0.08);color:rgba(234,244,255,0.9)}
    .btn-next{flex:1}

    /* fixed bottom CTA container for mobile thumb reach */
    .bottom-cta{position:fixed;left:0;right:0;bottom:0;padding:.9rem 1rem;background:linear-gradient(180deg,rgba(2,6,23,0.02),rgba(2,6,23,0.06));backdrop-filter:blur(8px);display:flex;gap:.6rem;justify-content:center;border-top:1px solid rgba(255,255,255,0.03)}

    /* fade-in helper */
    .reveal{opacity:0;transform:translateY(10px);transition:opacity .6s ease,transform .6s cubic-bezier(.2,.9,.3,1)}
    .reveal.active{opacity:1;transform:translateY(0)}

    @media(min-width:900px){
      body.page-onboarding{background:linear-gradient(180deg,#07132a 0%, #07243b 60%, #03202e 100%)}
      .onboard-hero{padding:3rem}
      .floating-icons{right:12%;top:18%}
      .bottom-cta{display:none}
    }
  </style>
</head>
<body class="page-onboarding">
  <main class="onboard-hero">
    <div class="floating-icons" aria-hidden="true">
      <div class="icon">💧</div>
      <div class="icon">🏃</div>
      <div class="icon">📚</div>
    </div>

    <div class="onboard-visual reveal">
      <img src="assets/illustrations/train img.png" alt="Habits illustration" />
    </div>

    <div class="onboard-card reveal" role="region" aria-label="Onboarding step">
      <div class="onboard-eyebrow">Begin simply</div>
      <h2 class="onboard-title">Create a calm routine</h2>
      <p class="onboard-copy">Pick one small action and turn an empty page into a space that feels ready for the day.</p>

      <div class="progress-dots" aria-hidden="true">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  </main>

  <div class="bottom-cta">
    <button id="skip-onboarding" class="btn btn-ghost btn-skip">Skip</button>
    <button id="onboarding-next" class="btn btn-primary btn-next">Next</button>
  </div>

  <script src="app.js"></script>
  <script>
    // Trigger reveal animations for immediate elements (also handled by initAnimations observer)
    document.querySelectorAll('.reveal').forEach(el => setTimeout(() => el.classList.add('active'), 120));
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HabitFlow — Track Your Growth</title>
  <meta name="description" content="Monitor progress, build streaks, unlock achievements." />
  <link rel="icon" href="image/train img.png" type="image/png" />
  <link rel="stylesheet" href="style.css" />
  <meta name="theme-color" content="#14B8A6" />
  <style>
    /* Premium, mobile-first onboarding step 2 */
    html,body{height:100%;margin:0}
    body.page-onboarding{min-height:100vh;display:flex;flex-direction:column;background:linear-gradient(180deg,#07132a 0%, #06283a 45%, #052b3c 100%);color:#EAF4FF;font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}

    .step-hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.25rem;gap:1rem;position:relative;overflow:hidden}

    .analytics-visual{width:86%;max-width:460px;border-radius:20px;padding:1rem;background:linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.02));box-shadow:0 36px 100px rgba(2,6,23,0.6);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.04);display:grid;place-items:center}
    .analytics-visual img{width:100%;height:auto;border-radius:14px}

    .chart-icons{position:absolute;left:6%;top:14%;display:flex;flex-direction:column;gap:.6rem;pointer-events:none}
    .chart-icons .ci{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,rgba(255,255,255,0.95),rgba(255,255,255,0.88));display:grid;place-items:center;font-size:1.1rem;box-shadow:0 14px 36px rgba(2,6,23,0.5)}
    .ci.c1{animation:floatSlight 6s ease-in-out infinite}
    .ci.c2{animation:floatSlight 5s ease-in-out infinite;animation-delay:.2s}
    .ci.c3{animation:floatSlight 7s ease-in-out infinite;animation-delay:.5s}

    .content-card{width:92%;max-width:540px;background:rgba(255,255,255,0.04);border-radius:18px;padding:1rem;border:1px solid rgba(255,255,255,0.04);backdrop-filter:blur(8px);box-shadow:0 18px 48px rgba(2,6,23,0.55);text-align:center}
    .content-eyebrow{color:rgba(234,244,255,0.95);font-weight:800}
    .content-title{font-size:clamp(1.8rem,5.2vw,2.6rem);margin:0.35rem 0 0.5rem;font-weight:800}
    .content-desc{color:rgba(234,244,255,0.86);margin:0 0 0.8rem}

    .stats-row{display:flex;gap:.6rem;justify-content:center;margin-top:.6rem}
    .stat{flex:1;min-width:84px;background:rgba(255,255,255,0.03);padding:.6rem;border-radius:12px}
    .stat .val{font-weight:800;font-size:1.25rem}
    .stat .label{font-size:.78rem;color:rgba(234,244,255,0.8)}

    .trophy{width:64px;height:64px;border-radius:14px;background:linear-gradient(135deg,#FFD580,#FFC857);display:grid;place-items:center;font-size:1.6rem;margin:0 auto;box-shadow:0 18px 48px rgba(255,200,80,0.12);animation:trophyBounce 2400ms ease-in-out infinite}
    @keyframes trophyBounce{0%{transform:translateY(0)}40%{transform:translateY(-8px)}70%{transform:translateY(0)}100%{transform:translateY(0)}}

    .progress-dots{display:flex;gap:.5rem;align-items:center;justify-content:center;margin-top:.9rem}
    .dot{width:10px;height:10px;border-radius:999px;background:rgba(255,255,255,0.12)}
    .dot.active{background:linear-gradient(135deg,var(--primary),var(--accent));width:12px;height:12px;transform:scale(1.05)}

    .bottom-cta{position:fixed;left:0;right:0;bottom:0;padding:.9rem 1rem;background:linear-gradient(180deg,rgba(2,6,23,0.02),rgba(2,6,23,0.06));backdrop-filter:blur(8px);display:flex;gap:.6rem;justify-content:center;border-top:1px solid rgba(255,255,255,0.03)}

    .reveal{opacity:0;transform:translateY(10px);transition:opacity .6s ease,transform .6s cubic-bezier(.2,.9,.3,1)}
    .reveal.active{opacity:1;transform:translateY(0)}

    @media(min-width:900px){.chart-icons{left:10%;top:20%}.bottom-cta{display:none}}
  </style>
</head>
<body class="page-onboarding">
  <main class="step-hero">
    <div class="chart-icons" aria-hidden="true">
      <div class="ci c1">📈</div>
      <div class="ci c2">📊</div>
      <div class="ci c3">📉</div>
    </div>

    <div class="analytics-visual reveal">
      <img src="assets/illustrations/train img.png" alt="Analytics illustration" />
    </div>

    <div class="content-card reveal" role="region" aria-label="Track your growth">
      <div class="content-eyebrow">Keep it visible</div>
      <h1 class="content-title">Track your day</h1>
      <p class="content-desc">Log your progress in a simple way, review your momentum, and keep your routine clear.</p>

      <div class="stats-row">
        <div class="stat">
          <div class="val">🌿</div>
          <div class="label">Gentle</div>
        </div>
        <div class="stat">
          <div class="val">📝</div>
          <div class="label">Clear</div>
        </div>
        <div class="stat">
          <div class="val">📍</div>
          <div class="label">Focused</div>
        </div>
      </div>

      <div class="progress-dots" aria-hidden="true">
        <span class="dot"></span>
        <span class="dot active"></span>
        <span class="dot"></span>
      </div>
    </div>
  </main>

  <div class="bottom-cta">
    <button id="skip-onboarding" class="btn btn-ghost">Skip</button>
    <button id="onboarding-next" class="btn btn-primary">Continue</button>
  </div>

  <script src="app.js"></script>
  <script>
    document.querySelectorAll('.reveal').forEach((el,i)=> setTimeout(()=> el.classList.add('active'), 100 + i*90));
  </script>
</body>
</html>
